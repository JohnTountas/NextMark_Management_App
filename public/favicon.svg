<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Simple geometric checkmark so the icon stays recognizable even at small
       favicon sizes and in browser tab previews. -->
  <defs>
    <linearGradient id="nextmark-gradient" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#ea580c" />
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#nextmark-gradient)" />
  <circle cx="22" cy="20" r="10" fill="#fff7ed" opacity="0.2" />
  <path
    d="M18 33.5 28 43.5 46 22.5"
    fill="none"
    stroke="#fffaf5"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="6"
  />
</svg>
